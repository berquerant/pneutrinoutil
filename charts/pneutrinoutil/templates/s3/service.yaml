apiVersion: v1
kind: Service
metadata:
  name: {{ include "pneutrinoutil.fullname" . }}-s3
  labels:
    app: s3
    {{- include "pneutrinoutil.labels" . | nindent 4 }}
spec:
  selector:
    app: s3
    {{- include "pneutrinoutil.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      name: s3-svc
{{- if .Values.pneutrinoutil.useKind }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pneutrinoutil.fullname" . }}-s3-expose
  labels:
    app: s3
    {{- include "pneutrinoutil.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: s3
    {{- include "pneutrinoutil.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      nodePort: {{ .Values.pneutrinoutil.kind.ports.s3.container }}
      port: 9000
      targetPort: 9000
      name: s3-svc
    - protocol: TCP
      nodePort: {{ .Values.pneutrinoutil.kind.ports.s3Admin.container }}
      port: 23646
      targetPort: 23646
      name: s3-admin
{{- end }}
