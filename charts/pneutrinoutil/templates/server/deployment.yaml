apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pneutrinoutil.fullname" . }}-server
  labels:
    app: server
    {{- include "pneutrinoutil.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
      {{- include "pneutrinoutil.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: server
        {{- include "pneutrinoutil.labels" . | nindent 8 }}
      annotations:
        checksum/s3-common: {{ include "pneutrinoutil.s3Common" . | sha256sum }}
        checksum/server-common: {{ include "pneutrinoutil.serverCommon" . | sha256sum }}
        checksum/util: {{ include "pneutrinoutil.util" . | sha256sum }}
    spec:
      volumes:
        - name: script
          configMap:
            name: {{ include "pneutrinoutil.fullname" . }}-util
            defaultMode: 0755
            items:
              - key: retry.sh
                path: retry.sh
      initContainers:
        - name: wait-mysql
          image: "{{ .Values.images.mysql.repository }}:{{ .Values.images.mysql.tag }}"
          command:
            - /usr/local/bin/util/retry.sh
            - --
            - mysqladmin
            - ping
            - -u
            - root
            - -p$(MYSQL_ROOT_PASSWORD)
            - -h
            - {{ include "pneutrinoutil.fullname" . }}-mysql
          volumeMounts:
            - name: script
              mountPath: /usr/local/bin/util
              readOnly: true
          envFrom:
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-server-common
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-s3-common
        - name: wait-redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          command:
            - /usr/local/bin/util/retry.sh
            - --
            - redis-cli
            - -h
            - {{ include "pneutrinoutil.fullname" . }}-redis
            - ping
          volumeMounts:
            - name: script
              mountPath: /usr/local/bin/util
              readOnly: true
          envFrom:
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-server-common
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-s3-common
        - name: wait-s3
          image: "{{ .Values.images.s3Setup.repository }}:{{ .Values.images.s3Setup.tag }}"
          command:
            - /usr/local/bin/util/retry.sh
            - --
            - aws
            - s3
            - ls
          volumeMounts:
            - name: script
              mountPath: /usr/local/bin/util
              readOnly: true
          envFrom:
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-server-common
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-s3-common
      containers:
        - name: server
          image: "{{ .Values.images.server.repository }}:{{ .Values.images.server.tag }}"
          ports:
            - containerPort: 9101
              protocol: TCP
              name: server-svc
          env:
            - name: DEBUG
              value: "{{ .Values.server.debug }}"
          envFrom:
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-server-common
            - configMapRef:
                name: {{ include "pneutrinoutil.fullname" . }}-s3-common
          livenessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /v1/health
              port: 9101
