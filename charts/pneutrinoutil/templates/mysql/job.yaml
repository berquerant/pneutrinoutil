apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pneutrinoutil.fullname" . }}-mysql-setup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
  labels:
     {{- include "pneutrinoutil.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      annotations:
        checksum/config: {{ include "pneutrinoutil.mysql.config" . | sha256sum }}
        checksum/config-setup: {{ include "pneutrinoutil.mysql.configSetup" . | sha256sum }}
        checksum/util: {{ include "pneutrinoutil.util" . | sha256sum }}
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: script
          configMap:
            name: {{ include "pneutrinoutil.fullname" . }}-mysql-setup
            defaultMode: 0755
            items:
              - key: setup.sh
                path: setup.sh
        - name: util
          configMap:
            name: {{ include "pneutrinoutil.fullname" . }}-util
            defaultMode: 0755
            items:
              - key: retry.sh
                path: retry.sh
        - name: ddl
          configMap:
            name: {{ include "pneutrinoutil.fullname" . }}-mysql-setup
      initContainers:
        - name: wait-mysql
          image: "{{ .Values.images.mysql.repository }}:{{ .Values.images.mysql.tag }}"
          command:
            - /usr/local/bin/util/retry.sh
            - --
            - mysqladmin
            - ping
            - -u
            - root
            - -p$(MYSQL_PASSWORD)
            - -h
            - $(MYSQL_HOST)
          volumeMounts:
            - name: util
              mountPath: /usr/local/bin/util
              readOnly: true
          env:
            - name: MYSQL_HOST
              value: {{ include "pneutrinoutil.fullname" . }}-mysql
            - name: MYSQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: {{ include "pneutrinoutil.fullname" . }}-mysql
                  key: rootPassword
      containers:
        - name: main
          image: "{{ .Values.images.mysql.repository }}:{{ .Values.images.mysql.tag }}"
          command:
            - /bin/bash
            - /usr/local/bin/setup/setup.sh
          volumeMounts:
            - name: script
              mountPath: /usr/local/bin/setup
              readOnly: true
            - name: ddl
              mountPath: /ddl
              readOnly: true
          env:
            - name: ROOT_DIR
              value: /ddl
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database }}
            - name: MYSQL_HOST
              value: {{ include "pneutrinoutil.fullname" . }}-mysql
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: {{ include "pneutrinoutil.fullname" . }}-mysql
                  key: rootPassword
