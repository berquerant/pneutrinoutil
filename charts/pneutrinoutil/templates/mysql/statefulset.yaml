apiVersion: apps/v1
{{- if .Values.mysql.asDeployment }}
kind: Deployment
{{- else }}
kind: StatefulSet
{{- end }}
metadata:
  name: {{ include "pneutrinoutil.fullname" . }}-mysql
  labels:
    app: mysql
    {{- include "pneutrinoutil.labels" . | nindent 4 }}
spec:
  replicas: 1
  {{- if not .Values.mysql.asDeployment }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        {{- if .Values.mysql.storage.useHostPath }}
        volumeName: {{ include "pneutrinoutil.fullname" . }}-mysql
        {{- end }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.mysql.storage.capacity  }}
  {{- end }}
  selector:
    matchLabels:
      app: mysql
      {{- include "pneutrinoutil.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: mysql
        {{- include "pneutrinoutil.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include "pneutrinoutil.mysql.config" . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 999 # mysql
      volumes:
        - name: cnf
          configMap:
            name: {{ include "pneutrinoutil.fullname" . }}-mysql
        {{- if .Values.mysql.asDeployment }}
        - name: data
          emptyDir: {}
        {{- end }}
      containers:
        - name: mysql
          securityContext:
            runAsNonRoot: true
            runAsUser: 999 # mysql
          image: "{{ .Values.images.mysql.repository }}:{{ .Values.images.mysql.tag }}"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: cnf
              mountPath: /etc/mysql/conf.d
              readOnly: true
          ports:
            - name: mysql-svc
              containerPort: 3306
              protocol: TCP
          startupProbe:
            failureThreshold: 10
            exec:
              command:
                - mysqladmin
                - ping
                - -u
                - root
                - -p$(MYSQL_ROOT_PASSWORD)
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -u
                - root
                - -p$(MYSQL_ROOT_PASSWORD)
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: {{ include "pneutrinoutil.fullname" . }}-mysql
                  key: rootPassword
