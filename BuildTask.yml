version: '3'

tasks:
  default:
    desc: Build binaries and images
    deps:
      - binaries
      - images
  images:
    if: '[[ "$SKIP_BUILD_IMAGES" != "true" && "$SKIP_BUILD" != "true" ]]'
    cmds:
      - cmd: docker buildx bake
        if: '[[ "$CI" = "" ]]'
      - cmd: docker buildx bake --set "*.cache-from=type=gha" --set "*.cache-to=type=gha,mode=max"
        if: '[[ "$CI" != "" ]]'
  binaries:
    if: '[[ "$SKIP_BUILD_BINARIES" != "true" && "$SKIP_BUILD" != "true" ]]'
    deps:
      - cli
      - server
      - worker
      - mockcli
      - gendata
  cli:
    cmds:
      - ./bin/build.sh -o dist/pneutrinoutil cli/main.go
  server:
    cmds:
      - ./bin/build.sh -o dist/pneutrinoutil-server server/main.go
  worker:
    cmds:
      - ./bin/build.sh -o dist/pneutrinoutil-worker worker/main.go
  mockcli:
    cmds:
      - ./bin/build.sh -o dist/pneutrinoutil-mockcli mockcli/main.go
  gendata:
    cmds:
      - ./bin/build.sh -o dist/pneutrinoutil-gendata gendata/main.go
