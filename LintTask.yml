version: '3'

includes:
  ui-lint:
    dir: ./ui
    taskfile: ./ui/LintTask.yml

tasks:
  default:
    desc: Run linters
    deps:
      - yamllint
      - ls-lint
      - shellcheck
      - vuln
      - vet
      - fix
      - golangci-lint
      - go-arch-lint
      - ui-lint
  vuln:
    cmds:
      - ./tools/run.sh govulncheck ./...
  vet:
    cmds:
      - go vet ./...
  fix:
    cmds:
      - go fix -diff ./...
  golangci-lint:
    cmds:
      - ./tools/run.sh golangci-lint config verify -v
      - ./tools/run.sh golangci-lint run
  go-arch-lint:
    cmds:
      - ./tools/run.sh go-arch-lint check
      - mkdir -p tmp
      - ./tools/run.sh go-arch-lint graph -t di --out tmp/go-arch-lint.svg
  shellcheck:
    cmds:
      - ./bin/shellcheck.sh
  ls-lint:
    cmds:
      - ./tools/run.sh ls-lint
  yamllint:
    cmds:
      - uv run yamllint .
