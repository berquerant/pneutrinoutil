version: '3'

includes:
  build:
    taskfile: BuildTask.yml
  run:
    taskfile: RunTask.yml

tasks:
  default:
    cmds:
      - task: reload-cluster
      - task: reload-images
      - task: deploy
  test:
    cmds:
      - task: reload-cluster
      - task: reload-images
      - task: test-deploy
  purge:
    cmds:
      - rm -rf tmp/data/mysql tmp/data/s3
  reload:
    deps:
      - stop
    cmds:
      - task: default
  redeploy:
    deps:
      - uninstall
    cmds:
      - task: deploy
  stop:
    deps:
      - run:stop-k8s-worker
      - delete-cluster
  delete-cluster:
    cmds:
      - ./tools/run.sh kind delete cluster || true
  create-cluster:
    cmds:
      - ./tools/run.sh kind create cluster --config .cluster.yaml --image "$KIND_NODE_IMAGE"
  reload-cluster:
    if: '[[ "$SKIP_RELOAD_CLUSTER" != "true" || "$CI" = "true" ]]'
    deps:
      - delete-cluster
    cmds:
      - task: create-cluster
  deploy:
    cmds:
      - ./tools/run.sh helm upgrade pneutrinoutil ./charts/pneutrinoutil --install --debug
      - task: run:reload-k8s-worker
  test-deploy:
    cmds:
      - ./tools/run.sh helm upgrade pneutrinoutil ./charts/pneutrinoutil --install -f test-values.yaml --debug
      - task: run:reload-k8s-worker
  uninstall:
    cmds:
      - ./tools/run.sh helm uninstall pneutrinoutil
  reload-images:
    cmds:
      - task: build:images
      - task: load-images
      - task: restart-deploys
  load-images:
    deps:
      - load-server-image
      - load-ui-image
      - load-curl-image
  restart-deploys:
    deps:
      - restart-server
      - restart-ui
  #
  # server
  #
  restart-server:
    cmds:
      - ./tools/run.sh kubectl rollout restart deploy pneutrinoutil-server || true
  load-server-image:
    cmds:
      - ./tools/run.sh kind load docker-image pneutrinoutil/server:local
  #
  # ui
  #
  restart-ui:
    cmds:
      - ./tools/run.sh kubectl rollout restart deploy pneutrinoutil-ui || true
  load-ui-image:
    cmds:
      - ./tools/run.sh kind load docker-image pneutrinoutil/ui:local
  #
  # etc
  #
  load-curl-image:
    cmds:
      - ./tools/run.sh kind load docker-image pneutrinoutil/curl:local
