name: CI

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Build
        run: ./task build:binaries

  test:
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set env vars
        uses: ./.github/actions/setup-env
      - name: Set up Docker
        uses: ./.github/actions/setup-docker
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Create kind cluster
        uses: ./.github/actions/setup-cluster
        with:
          node_image: '${{ env.KIND_NODE_IMAGE }}'
      - name: Test
        run: ./task test:unit

  e2e:
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set env vars
        uses: ./.github/actions/setup-env
      - name: Set up Docker
        uses: ./.github/actions/setup-docker
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Create kind cluster
        uses: ./.github/actions/setup-cluster
        with:
          node_image: '${{ env.KIND_NODE_IMAGE }}'
      - name: E2E
        run: ./task test:e2e

  lint:
    timeout-minutes: 5
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set env vars
        uses: ./.github/actions/setup-env
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
      - name: Setup Python
        uses: ./.github/actions/setup-python
      - name: Lint
        run: ./task lint

  shell-lint:
    timeout-minutes: 5
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set env vars
        uses: ./.github/actions/setup-env
      - name: Enable Shellcheck problem matcher
        run: echo "::add-matcher::.github/shellcheck-matcher.json"
      - name: Shellcheck
        run: |
          ./bin/shellcheck.sh
          echo "::remove-matcher owner=shellcheck-matcher::"
