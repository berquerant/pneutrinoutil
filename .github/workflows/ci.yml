name: CI

permissions: {}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-binaries:
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Build
        run: ./task build:binaries

  build-images:
    timeout-minutes: 10
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Setup Buildx
        run: |
          docker buildx version
          docker buildx create --name mybuilder --use
          docker buildx inspect --bootstrap
      - name: Build
        run: ./task build:images

  test-unit:
    timeout-minutes: 20
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Lima
        uses: ./.github/actions/setup-lima
      - name: Start VM
        run: ./bin/lima.sh start
        env:
          TARGET_REF: "${{ github.sha }}"
      - name: Run Test
        run: ./bin/lima.sh run ./task test:unit

  # NOTE: Abandoned MySQL 9.6 startup fix on 2026-04
