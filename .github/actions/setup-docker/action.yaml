name: Docker Setup
description: Setup docker daemon
runs:
  using: "composite"
  steps:
    - name: Set up Docker
      uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5.2.0
      with:
        version: type=archive,channel=stable,version=v28.5.2
        daemon-config: |
          {
            "registry-mirrors": [
              "https://mirror.gcr.io"
            ]
          }
