name: Docker Setup
description: Setup docker daemon
runs:
  using: "composite"
  steps:
    - name: Set up Docker
      uses: docker/setup-docker-action@e43656e248c0bd0647d3f5c195d116aacf6fcaf4 # v4.7.0
      with:
        version: type=archive,channel=stable,version=v28.5.2
        daemon-config: |
          {
            "registry-mirrors": [
              "https://mirror.gcr.io"
            ]
          }
