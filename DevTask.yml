version: '3'

includes:
  ui:
    taskfile: ./ui/DevTask.yml
    dir: ./ui
  gen:
    taskfile: GenTask.yml
  build:
    taskfile: BuildTask.yml
  lint:
    taskfile: LintTask.yml
  test:
    taskfile: TestTask.yml
  k8s:
    taskfile: K8sTask.yml
  run:
    taskfile: RunTask.yml

tasks:
  default:
    deps:
      - lint
      - test
      - build
  # mockdata:
  #   desc: Generate artifacts
  #   deps:
  #     - build:mockcli
  #   cmds:
  #     - ./bin/mockdata.sh {{.CLI_ARGS}}
  init:
    deps:
      - gen:envrc
  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy
      - go -C tools mod tidy
